name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" pytest

      - name: Lint (ruff, warn-only baseline)
        run: ruff check plugin/ tools/ tests/ || echo "warning: ruff baseline has pre-existing UP0xx modernization issues — non-blocking until dedicated sweep PR"
        continue-on-error: true

      - name: Validate manifests
        run: bash tools/validate_manifests.sh

      - name: Run tests
        run: pytest tests/ -q
