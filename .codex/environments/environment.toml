# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "apple-mail-mcp"

[setup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:-$PWD}"

PYTHON_BIN=""
for candidate in python3.12 python3.13 python3.11 python3.10 python3; do
  if command -v "$candidate" >/dev/null 2>&1; then
    PYTHON_BIN="$candidate"
    break
  fi
done

if [ -z "$PYTHON_BIN" ]; then
  echo "Python 3.10+ is required. Prefer python3.12."
  exit 1
fi

"$PYTHON_BIN" -m venv .venv
.venv/bin/python -m pip install --upgrade pip
.venv/bin/pip install -e '.[dev]'

# Prewarm the shipped plugin runtime venv too.
bash plugin/start_mcp.sh --ensure-only
'''

[cleanup]
script = '''
set -euo pipefail

cd "${CODEX_WORKTREE_PATH:-$PWD}"

# Stop MCP processes launched from this exact worktree, if any.
if command -v pgrep >/dev/null 2>&1; then
  pgrep -f "$PWD/plugin/apple_mail_mcp.py" | xargs -r kill || true
fi

rm -rf \
  .pytest_cache \
  .mypy_cache \
  .ruff_cache \
  .hypothesis \
  .coverage \
  htmlcov \
  plugin/venv \
  .venv
'''

[[actions]]
name = "Dev-Check"
icon = "tool"
command = "bash tools/gates/dev-check.sh"

[[actions]]
name = "Release-Gate"
icon = "tool"
command = "bash tools/gates/dev-check.sh release"

[[actions]]
name = "Live-Smoke"
icon = "tool"
command = "bash tools/gates/dev-check.sh live"
